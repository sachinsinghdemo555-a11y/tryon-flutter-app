name: jewellery_tryon
description: Virtual Jewellery Try-On powered by Gemini AI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Networking
  http: ^1.2.1
  # Image picking & camera
  image_picker: ^1.1.2
  camera: ^0.11.0+2
  # Saving & sharing generated images
  path_provider: ^2.1.4
  share_plus: ^10.1.4
  gal: ^1.2.1
  # UI & styling
  google_fonts: ^6.2.1
  flutter_spinkit: ^5.2.1
  # Icons
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
